<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مقارنة بين دولتين</title>
</head>
<body>

<div class="container">
  <!-- الهيدر -->
  <header class="header">
    <h1>🌍 مقارنة بين دولتين</h1>
    <p>اكتشف معلومات أساسية عن الدول بشكل سريع</p>
  </header>

  <!-- المحتوى: القوائم والزرار -->
  <main class="content">
    <div class="select-group">
      <label for="country1">الدولة الأولى:</label>
      <select id="country1">
        <option value="">-- اختر دولة --</option>
      </select>
    </div>

    <div class="select-group">
      <label for="country2">الدولة الثانية:</label>
      <select id="country2">
        <option value="">-- اختر دولة --</option>
      </select>
    </div>

    <button id="compareBtn">قارن</button>
  </main>

  <!-- نتيجة المقارنة -->
  <section id="result">
    <!-- ستظهر كروت الدول هنا بعد الضغط على زر القارن -->
  </section>
</div>

</body>
</html>
